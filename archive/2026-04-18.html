</div>

          label: function(ctx) {
            const d = DATA[ctx.dataIndex];
            return ctx.dataset.label + ': ' + (ctx.parsed.y !== null ? ctx.parsed.y.toLocaleString() : '-') + ' 件';
          },
          afterLabel: function(ctx) {
            const d = DATA[ctx.dataIndex];
            return '(' + d.wday + ')';
          }
        }
      }
    }
  }
});

// View controls
document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.v;
    if (v === 'raw') mainChart.data.datasets = [rawDs];
    else if (v === 'ma7') mainChart.data.datasets = [maDs];
    else mainChart.data.datasets = [rawDs, maDs];
    mainChart.update();
  });
});

// Monthly averages
const monthly = {};
DATA.forEach(d => {
  const mo = d.date.slice(0,7);
  if (!monthly[mo]) monthly[mo] = [];
  monthly[mo].push(d.count);
});
const moLabels = Object.keys(monthly).sort();
const moAvg = moLabels.map(m => Math.round(monthly[m].reduce((a,b)=>a+b,0)/monthly[m].length));

new Chart(document.getElementById('monthChart').getContext('2d'), {
  type: 'bar',
  data: { labels: moLabels, datasets: [{ label: '月平均件数', data: moAvg, backgroundColor: '#FF5A5F' }] },
  options: {
    responsive: true, maintainAspectRatio: false,
    scales: { y: { beginAtZero: true } },
    plugins: { legend: { display: false } }
  }
});

// Weekday averages
const wd = {'月':[],'火':[],'水':[],'木':[],'金':[],'土':[],'日':[]};
DATA.forEach(d => wd[d.wday].push(d.count));
const wdLabels = ['月','火','水','木','金','土','日'];
const wdAvg = wdLabels.map(w => Math.round(wd[w].reduce((a,b)=>a+b,0)/wd[w].length));
const wdColors = wdLabels.map(w => (w === '土' || w === '日') ? '#FFA500' : '#FF5A5F');

new Chart(document.getElementById('wdayChart').getContext('2d'), {
  type: 'bar',
  data: { labels: wdLabels, datasets: [{ label: '曜日別平均', data: wdAvg, backgroundColor: wdColors }] },
  options: {
    responsive: true, maintainAspectRatio: false,
    scales: { y: { beginAtZero: true } },
    plugins: { legend: { display: false } }
  }
});
</script>
</body>
</html>
